name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  typecheck-web:
    name: Typecheck Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npx tsc -b
        working-directory: web

  typecheck-functions:
    name: Typecheck Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: npx tsc --noEmit
        working-directory: functions

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [typecheck-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run lint --prefix web

  test-unit-web:
    name: Unit Tests (Web)
    runs-on: ubuntu-latest
    needs: [typecheck-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run test:coverage --prefix web
      - name: Upload web coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: web/coverage/lcov.info
          flags: web
          fail_ci_if_error: false

  test-unit-functions:
    name: Unit Tests (Functions)
    runs-on: ubuntu-latest
    needs: [typecheck-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: npm run test:coverage --prefix functions
      - name: Upload functions coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: functions/coverage/lcov.info
          flags: functions
          fail_ci_if_error: false

  test-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    needs: [typecheck-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Run rules tests under the Firestore emulator
        run: firebase emulators:exec --only firestore --project demo-speakeasy 'npm run test:rules --prefix functions'
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080

  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, test-unit-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - name: Build (with demo env for CI)
        run: npm run build --prefix web
        env:
          VITE_FIREBASE_PROJECT_ID: demo-speakeasy
          VITE_FIREBASE_API_KEY: demo-key
          VITE_FIREBASE_AUTH_DOMAIN: demo-speakeasy.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: demo-speakeasy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:000000000000'
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  test-e2e:
    name: E2E + Visual Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web
      # Visual specs are excluded: baselines must be generated on this runner
      # (font rendering) and none are committed yet — see CLAUDE.md
      - name: Run E2E tests
        run: npm run test:e2e --prefix web -- e2e/navigation.spec.ts
        env:
          CI: 'true'
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: the-speakeasy-e3533
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
